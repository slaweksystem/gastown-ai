name: gastown-ai

services:
  db:
    image: postgres:16-alpine
    container_name: gastown-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gastown
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  gitea:
    image: gitea/gitea:1.22
    container_name: gastown-gitea
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: db:5432
      GITEA__database__NAME: ${POSTGRES_DB}
      GITEA__database__USER: ${POSTGRES_USER}
      GITEA__database__PASSWD: ${POSTGRES_PASSWORD}
      GITEA__server__DOMAIN: ${GITEA_DOMAIN:-localhost}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL:-http://localhost:3000/}
      GITEA__server__SSH_DOMAIN: ${GITEA_DOMAIN:-localhost}
      GITEA__server__SSH_PORT: ${GITEA_SSH_PORT:-2222}
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: ${GITEA_DISABLE_REGISTRATION:-true}
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${GITEA_HTTP_PORT:-3000}:3000"
      - "${GITEA_SSH_PORT:-2222}:22"
    networks:
      - gastown
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  gastown:
    build:
      context: ./gastown
      dockerfile: Dockerfile
    container_name: gastown-gt
    restart: unless-stopped
    depends_on:
      gitea:
        condition: service_healthy
    environment:
      IS_SANDBOX: "1"
      GIT_USER: ${GIT_USER:-Gastown}
      GIT_EMAIL: ${GIT_EMAIL:-gastown@localhost}
      GITEA_USER: ${GASTOWN_GIT_USER:-gastown}
      GITEA_HOST: gitea:3000
      CURSOR_API_KEY: ${CURSOR_API_KEY:-}
    volumes:
      - gastown-workspace:/gt
      - dolt-data:/gt/.dolt-data
      - agent-home:/home/agent
      - ./data/gastown-secrets:/run/gastown:ro
    ports:
      - "${GASTOWN_DASHBOARD_PORT:-8080}:8080"
    networks:
      - gastown
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "test", "-f", "/gt/mayor/town.json"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

networks:
  gastown:
    driver: bridge

volumes:
  postgres-data:
  gitea-data:
  gastown-workspace:
  dolt-data:
  agent-home:
